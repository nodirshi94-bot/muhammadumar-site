<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuhammadUmar uchun maxsus sahifa</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            color: #333;
            padding-bottom: 50px;
        }
        header {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
            margin-bottom: 30px;
        }
        header h1 {
            color: #4a6fa5;
            font-size: 2.3rem;
            margin-bottom: 5px;
        }
        header p {
            font-size: 1.1rem;
            color: #666;
            font-style: italic;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .section h2 {
            color: #4a6fa5;
            margin-bottom: 20px;
            border-bottom: 2px solid #e8e8e8;
            padding-bottom: 10px;
        }
        /* Avatar video qutisi */
        .main-video-wrapper {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            margin-bottom: 25px;
            background: #000;
        }
        .main-video-wrapper video {
            width: 100%;
            display: block;
        }
        /* Galereya setkasi */
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .media-item {
            background: #f8fafc;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .wishes-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <header>
        <h1>MuhammadUmar uchun maxsus sahifa</h1>
        <p>Dunyodagi eng aqlli va jasur o'g'lon!</p>
    </header>

    <div class="container">
        
        <!-- Albom bo'limi -->
        <div class="section">
            <h2>MuhammadUmarning Albomi</h2>
            
            <!-- Faqat Avatar videosi qoldi -->
            <div class="main-video-wrapper">
                <video controls>
                    <source src="Avatar 1.mp4" type="video/mp4">
                    Brauzeringiz videoni qo'llab-quvvatlamaydi.
                </video>
            </div>

            <!-- Rasmlar galereyasi pastda -->
            <div class="media-grid">
                
                <!-- 1-Rasm -->
                <div class="media-item">
                    <img src="photo_2026-07-19 17.32.06.jpeg" alt="MuhammadUmar">
                </div>

                <!-- 2-Rasm -->
                <div class="media-item">
                    <img src="photo_2026-07-19 19.13.19.jpeg" alt="MuhammadUmar">
                </div>

                <!-- 3-Rasm -->
                <div class="media-item">
                    <img src="photo_2026-07-19 19.13.23.jpeg" alt="MuhammadUmar">
                </div>

                <!-- 4-Rasm -->
                <div class="media-item">
                    <img src="photo_2026-07-19 19.13.29.jpeg" alt="MuhammadUmar">
                </div>

            </div>
        </div>

        <!-- Tilaklar bo'limi -->
        <div class="section">
            <h2>Eng ezgu tilaklar</h2>
            <div class="wishes-text">
                <p>MuhammadUmar, senin kelajaging xuddi isming kabi buyuk va nurli bo'lsin! Har doim ilmga intiluvchan, jasoratli va oilasining faxri bo'ladigan yigit bo'lib ulg'ayishingni tilaymiz.</p>
            </div>
        </div>

    </div>

</body>
</html>
